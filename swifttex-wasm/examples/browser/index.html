<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftTeX Browser Example</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        }
        #output {
            padding: 20px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .status {
            font-size: 12px;
            color: #888;
            text-align: right;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <h1>SwiftTeX</h1>
        <div class="controls" style="display: flex; gap: 10px;">
            <label><input type="radio" name="output" value="svg" checked> SVG</label>
            <label><input type="radio" name="output" value="mathml"> MathML</label>
            <label><input type="radio" name="output" value="both"> Both</label>
        </div>
        <textarea id="input">\frac{x^2 + 1}{\sqrt{y}}</textarea>
        <div id="output" class="swifttex swifttex-display">Loading WASM...</div>
        <div id="aria-label-display" style="font-size: 12px; color: #888; text-align: center;"></div>
        <div class="status" id="status"></div>
    </div>

    <script type="module">
        import init, { render } from '../../pkg/swifttex.js';

        async function main() {
            await init();
            
            const inputEl = document.getElementById('input');
            const outputEl = document.getElementById('output');
            const statusEl = document.getElementById('status');
            const ariaLabelEl = document.getElementById('aria-label-display');
            const outputRadios = document.querySelectorAll('input[name="output"]');

            function update() {
                const text = inputEl.value;
                const outputFormat = document.querySelector('input[name="output"]:checked').value;
                const start = performance.now();
                
                try {
                    const result = render(text, { display_mode: true, font_size: 24.0, output: outputFormat });
                    if (result.error) {
                        outputEl.innerHTML = `<span style="color: #ff5555;">${result.error}</span>`;
                        ariaLabelEl.innerText = "";
                    } else if (outputFormat === 'svg' && result.svg) {
                        outputEl.innerHTML = result.svg;
                        const svgEl = outputEl.querySelector('svg');
                        ariaLabelEl.innerText = svgEl ? svgEl.getAttribute('aria-label') : "";
                    } else if (outputFormat === 'mathml' && result.mathml) {
                        outputEl.innerHTML = result.mathml;
                        const mathEl = outputEl.querySelector('math');
                        ariaLabelEl.innerText = mathEl ? mathEl.getAttribute('aria-label') : "";
                    } else if (outputFormat === 'both' && result.svg && result.mathml) {
                        outputEl.innerHTML = `<div style="display:flex; width:100%; gap:20px;"><div style="flex:1;">${result.svg}</div><div style="flex:1;"><pre style="font-size:12px; overflow-x:auto;">${result.mathml.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre></div></div>`;
                        const svgEl = outputEl.querySelector('svg');
                        ariaLabelEl.innerText = svgEl ? svgEl.getAttribute('aria-label') : "";
                    } else {
                        outputEl.innerHTML = "";
                        ariaLabelEl.innerText = "";
                    }
                } catch (e) {
                    outputEl.innerHTML = `<span style="color: #ff5555;">Crash: ${e}</span>`;
                    ariaLabelEl.innerText = "";
                }

                const end = performance.now();
                statusEl.innerText = `Rendered length ${text.length} in ${(end - start).toFixed(2)} ms`;
            }

            inputEl.addEventListener('input', update);
            outputRadios.forEach(r => r.addEventListener('change', update));
            update();
        }

        main().catch(e => {
            document.getElementById('output').innerHTML = "Failed to load WASM module.";
            console.error(e);
        });
    </script>
</body>
</html>
